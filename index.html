<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexus AI — Vistas por Vertical (Mockup)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --bg:#0a0a10;
    --bg-2:#0d0d14;
    --sidebar:#111119;
    --card:#16161f;
    --card-2:#1b1b26;
    --border:#26262f;
    --accent:#8b5cf6;
    --accent-soft:rgba(139,92,246,.14);
    --text:#eceaf2;
    --text-dim:#8d8d9a;
    --text-dim2:#5f5f6d;
    --green:#22c55e;
    --gray:#9ca3af;
    --blue:#3b82f6;
    --pink:#ec4899;
    --orange:#f97316;
    --red:#ef4444;
    --yellow:#eab308;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
    font-size:14px;
  }
  a{color:inherit;}
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:238px;
    flex-shrink:0;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:20px 14px;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px 8px;}
  .brand .logo{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#5b3bd6);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;color:#fff;
  }
  .brand .name{font-weight:700;font-size:16px;letter-spacing:.2px;}
  .brand .sub{font-size:10.5px;color:var(--text-dim);margin-top:1px;}
  .nav-section-title{
    font-size:10.5px;color:var(--text-dim2);text-transform:uppercase;
    letter-spacing:.08em;margin:14px 10px 8px 10px;font-weight:600;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:9px;cursor:pointer;
    color:var(--text-dim);font-size:13.5px;font-weight:500;
    border:1px solid transparent;
    margin-bottom:2px;
    transition:background .12s,color .12s;
  }
  .nav-item:hover{background:#1a1a24;color:var(--text);}
  .nav-item.active{
    background:var(--accent-soft);
    color:var(--text);
    border-color:rgba(139,92,246,.35);
  }
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .nav-item .kpi-count{margin-left:auto;font-size:10.5px;color:var(--text-dim2);}
  .sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim2);line-height:1.5;}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .topbar{
    padding:18px 28px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    background:linear-gradient(180deg,var(--bg-2),var(--bg));
  }
  .topbar h1{margin:0;font-size:19px;font-weight:700;}
  .topbar .desc{font-size:12.5px;color:var(--text-dim);margin-top:3px;}
  .badge-mock{
    font-size:10.5px;color:var(--text-dim);background:var(--card);
    border:1px solid var(--border);padding:4px 10px;border-radius:20px;
    display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .badge-mock .pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  .content{flex:1;overflow-y:auto;padding:22px 28px 60px 28px;}

  /* filter bar */
  .filterbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    margin-bottom:20px;
  }
  .filterbar select, .filterbar input{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:7px 10px;border-radius:8px;font-size:12.5px;font-family:inherit;
  }
  .filterbar select:hover, .filterbar input:hover{border-color:#3a3a46;}
  .filterbar label{font-size:11px;color:var(--text-dim2);margin-right:-4px;}
  .filterbar .fgroup{display:flex;align-items:center;gap:6px;}

  /* standalone form fields (outside filterbar) */
  .form-field{display:flex;flex-direction:column;gap:5px;}
  .form-field label{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.02em;}
  .form-select, .form-input{
    background:var(--bg-2);border:1px solid var(--border);color:var(--text);
    padding:9px 12px;border-radius:8px;font-size:12.5px;font-family:inherit;width:100%;
  }
  .form-select:hover, .form-input:hover{border-color:#3a3a46;}
  .form-select:focus, .form-input:focus{outline:none;border-color:var(--accent);}

  /* subtabs */
  .subtabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .subtab{
    padding:9px 14px;font-size:12.5px;color:var(--text-dim);cursor:pointer;
    border-bottom:2px solid transparent;font-weight:500;
  }
  .subtab:hover{color:var(--text);}
  .subtab.active{color:var(--text);border-bottom-color:var(--accent);}

  /* section title */
  .section-title{font-size:13px;font-weight:600;color:var(--text);margin:26px 0 12px 0;display:flex;align-items:center;gap:8px;}
  .section-title .tag{font-size:10px;font-weight:600;color:var(--text-dim);background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}
  .section-title:first-child{margin-top:0;}

  /* kpi grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;}
  .kpi-card{
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:14px 16px;
  }
  .kpi-card .label{font-size:11.5px;color:var(--text-dim);margin-bottom:8px;}
  .kpi-card .value{font-size:20px;font-weight:700;letter-spacing:-.2px;}
  .kpi-card .delta{font-size:11px;margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;}
  .delta.up{color:var(--green);background:rgba(34,197,94,.12);}
  .delta.down{color:var(--red);background:rgba(239,68,68,.12);}
  .delta.flat{color:var(--text-dim);background:#20202a;}

  /* two-col layout */
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
  .grid-2-stretch{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:stretch;}
  .grid-2-stretch>.panel{display:flex;flex-direction:column;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;}
  @media(max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr;}}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .panel h3{margin:0 0 3px 0;font-size:13.5px;font-weight:600;}
  .panel .panel-sub{font-size:11.5px;color:var(--text-dim);margin-bottom:14px;}
  .chart-wrap{position:relative;height:220px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;color:var(--text-dim2);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:9px 10px;border-bottom:1px solid #1c1c26;color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#1a1a24;}
  .table-compact{table-layout:auto;}
  .table-compact th, .table-compact td{padding:3px 8px;line-height:1.25;white-space:nowrap;}
  .table-compact td:first-child, .table-compact th:first-child{white-space:nowrap;}
  .pill{padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
  .pill.green{color:var(--green);background:rgba(34,197,94,.12);}
  .pill.red{color:var(--red);background:rgba(239,68,68,.12);}
  .pill.orange{color:var(--orange);background:rgba(249,115,22,.12);}
  .pill.blue{color:var(--blue);background:rgba(59,130,246,.12);}
  .pill.gray{color:var(--text-dim);background:#20202a;}
  .pill.pink{color:var(--pink);background:rgba(236,72,153,.14);}

  .legend-row{display:flex;gap:16px;align-items:center;font-size:11.5px;color:var(--text-dim);margin-top:10px;}
  .legend-row .sw{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;}

  /* map */
  .map-wrap{position:relative;min-height:340px;flex:1;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:
    radial-gradient(circle at 20% 30%, #171722 0, transparent 45%),
    radial-gradient(circle at 80% 70%, #171722 0, transparent 45%),
    repeating-linear-gradient(0deg, #131319 0 1px, #0e0e14 1px 46px),
    repeating-linear-gradient(90deg, #131319 0 1px, #0e0e14 1px 46px);
  }
  .pin{position:absolute;width:11px;height:11px;border-radius:50% 50% 50% 0;transform:translate(-50%,-100%) rotate(-45deg);cursor:pointer;border:1.5px solid rgba(0,0,0,.4);}
  .pin.direct{background:var(--green);}
  .pin.indirect{background:var(--orange);}
  .pin:hover{outline:2px solid #fff;outline-offset:2px;}
  .pin .tip{
    display:none;position:absolute;bottom:16px;left:50%;transform:translateX(-50%) rotate(45deg);
    background:#000000;border:1px solid var(--border);color:#fff;font-size:10.5px;padding:5px 8px;
    border-radius:6px;white-space:nowrap;z-index:5;
  }
  .pin:hover .tip{display:block;}

  /* rgm simulator */
  .simbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--card-2);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .simfield{display:flex;flex-direction:column;gap:5px;}
  .simfield label{font-size:10.5px;color:var(--text-dim2);text-transform:uppercase;letter-spacing:.04em;}
  .simfield select, .simfield input{background:var(--bg-2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:12.5px;min-width:130px;font-family:inherit;}
  .toggle-group{display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:3px;}
  .toggle-opt{padding:6px 10px;border-radius:6px;font-size:11.5px;cursor:pointer;color:var(--text-dim);}
  .toggle-opt.active{background:var(--accent);color:#fff;}
  .btn{
    background:linear-gradient(135deg,var(--accent),#6d3fe0);color:#fff;border:none;
    padding:9px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn.secondary{background:var(--card);border:1px solid var(--border);color:var(--text);}
  .btn.secondary:hover{border-color:#3a3a46;}
  .btn:disabled{opacity:.5;cursor:default;}

  .ia-card{
    border:1px solid rgba(139,92,246,.4);background:linear-gradient(180deg,rgba(139,92,246,.09),rgba(139,92,246,.02));
    border-radius:12px;padding:18px;margin-top:16px;
  }
  .ia-card .ia-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ia-card .ia-head .ico{width:22px;height:22px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;}
  .ia-card .ia-head b{font-size:13px;}
  .ia-card .rationale{font-size:12.5px;color:#d8d5e6;line-height:1.55;background:rgba(0,0,0,.18);border-radius:8px;padding:12px 14px;margin-bottom:14px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12.5px;}
  .empty-state .ico{font-size:26px;margin-bottom:10px;}

  .basket-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1c1c26;font-size:12px;}
  .basket-row:last-child{border-bottom:none;}
  .basket-bar{flex:1;height:6px;border-radius:4px;background:#20202a;overflow:hidden;}
  .basket-bar span{display:block;height:100%;background:var(--accent);}
  .foot-note{font-size:11px;color:var(--text-dim2);margin-top:14px;line-height:1.5;}

  .pill-badge{width:215px;text-align:center;justify-content:center;white-space:nowrap;}
  .chip{padding:7px 12px;border-radius:20px;background:var(--card-2);border:1px solid var(--border);font-size:12px;color:var(--text-dim);cursor:pointer;}
  .chip:hover{border-color:var(--accent);color:var(--text);}
  .chip.active-chip{background:var(--accent-soft);border-color:rgba(139,92,246,.5);color:var(--text);}
  .chat-input-row{display:flex;gap:8px;}
  .chat-input-row input{flex:1;background:var(--bg-2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:12.5px;font-family:inherit;}
  .chat-input-row input:focus{outline:none;border-color:var(--accent);}
  .chat-thread{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
  .chat-msg{padding:12px 14px;border-radius:10px;font-size:12.5px;line-height:1.6;}
  .chat-msg.chat-user{background:var(--accent-soft);border:1px solid rgba(139,92,246,.3);align-self:flex-end;max-width:70%;}
  .chat-msg.chat-ai{background:var(--bg-2);border:1px solid var(--border);}
  .nexus-block{margin-bottom:12px;}
  .nexus-block:last-child{margin-bottom:0;}
  .nb-tag{font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
  .nexus-block p{margin:0;color:var(--text);}
  .nexus-block ul{margin:4px 0 0 0;padding-left:18px;color:var(--text);}
  .nexus-block li{margin-bottom:4px;}
  .month-delta-strip{display:flex;justify-content:space-between;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
  .mds-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
  .mds-m{font-size:10px;color:var(--text-dim2);}
  .mds-v{font-size:11px;font-weight:700;}
  .mds-v.up{color:var(--green);}
  .mds-v.down{color:var(--red);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <div class="logo">N</div>
    <div>
      <div class="name">Nexus AI</div>
      <div class="sub">Vistas por vertical</div>
    </div>
  </div>
  <div class="nav-section-title">Verticales</div>
  <div id="nav" ></div>
  <div class="sidebar-footer">
    Mockup interactivo con datos ilustrativos.<br>Cambiá los filtros para ver cómo reaccionan los KPIs.
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <h1 id="viewTitle">Ventas</h1>
      <div class="desc" id="viewDesc">Información 100% ERP: lo que la empresa le vende a sus clientes.</div>
    </div>
    <div class="badge-mock"><span class="pulse"></span> Datos ilustrativos · para revisión de diseño</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ============================= DATA MODEL ============================= */
const VERTICALS = [
  {id:'ventas', label:'Ventas', color:'var(--green)', desc:'Información 100% ERP: lo que la empresa le vende a sus clientes.'},
  {id:'sellthrough', label:'Sell-Through', color:'var(--gray)', desc:'Sell-in (ERP) + sell-out (distribuidores/cadenas) + mercado (Nielsen/Scentia) + mapa de clientes.'},
  {id:'finanzas', label:'Finanzas', color:'var(--blue)', desc:'P&L, capital de trabajo, inventario de insumos, cobranzas y deuda.'},
  {id:'rgm', label:'RGM', color:'var(--pink)', desc:'Revenue Growth Management: vista consolidada + simulador de dinámica promocional.'},
];

const PERIODOS = ['Jul 2026 (MTD)','Jun 2026','Q2 2026','FY2026','Presupuesto'];
const CANALES  = ['Todos los canales','Moderno','Tradicional','E-commerce','Mayorista','On Premise'];
const REGIONES = ['Todas las regiones','CABA','GBA Norte','GBA Sur','Interior'];
const PROVINCIAS = ['Todas las provincias','Buenos Aires','CABA','Catamarca','Chaco','Chubut','Córdoba','Corrientes','Entre Ríos','Formosa','Jujuy','La Pampa','La Rioja','Mendoza','Misiones','Neuquén','Río Negro','Salta','San Juan','San Luis','Santa Cruz','Santa Fe','Santiago del Estero','Tierra del Fuego','Tucumán'];
const SKUS     = ['Todos los SKU','Producto A 500g','Producto A 1kg','Producto B Pack x6','Producto C Premium','Producto D Económico'];
const CLIENTES_SIM = ['Toda la cartera','Cadena Metro','Hiper Andes','Distribuidora Norte','Mayorista Sur','Super Regional'];
const CLIENTES    = ['Todos los clientes','Cadena Metro','Hiper Andes','Distribuidora Norte','Mayorista Sur','Super Regional','Distribuidora Litoral'];
const CATEGORIAS  = ['Todas las categorías','Categoría Foco','Categoría 2','Categoría 3'];
const SEGMENTOS   = ['Todos los segmentos','Premium','Core','Económico'];
const PRODUCTOS   = ['Todos los productos','Producto A 500g','Producto A 1kg','Producto B Pack x6','Producto C Premium','Producto D Económico'];
const VENDEDORES  = ['Todos los vendedores','Vendedor 1','Vendedor 2','Vendedor 3','Vendedor 4'];
const UNIDADES    = ['Kilos','Toneladas','Unidades','Litros','Cajas'];
const DISTRIBUIDORES = ['Todos los distribuidores','Distribuidora Norte SA','Bebidas Elite','Distribuidora Litoral','Mayorista Sur'];
const CLIENTES_SELLOUT = ['Todos los clientes sell-out','Carrefour','Coto','Jumbo/Cencosud','Walmart/Changomas','Almacén Independiente','Kiosco/Autoservicio'];
const RGM_DINAMICAS = ['Precio especial','Descuento porcentual','Combo','Bonificación','2x1 / segunda unidad'];
const RGM_OBJETIVOS = ['Recuperar volumen','Defender share de mercado','Activar PDVs inactivos','Liquidar stock excedente','Acompañar lanzamiento','Contrarrestar acción de competencia'];
const RGM_DESC_TIPOS = ['Desc. Comercial','Desc. Financiero (PP)','Desc. Logístico','Desc. Promocional','Desc. por Volumen'];
const UM_META = {
  'Kilos':      {volFactor:1,     priceFactor:1,    dec:0, suf:'kg'},
  'Toneladas':  {volFactor:0.001, priceFactor:1000, dec:1, suf:'Tn'},
  'Unidades':   {volFactor:2.15,  priceFactor:0.46, dec:0, suf:'u'},
  'Litros':     {volFactor:1.03,  priceFactor:0.97, dec:0, suf:'L'},
  'Cajas':      {volFactor:0.083, priceFactor:12,   dec:0, suf:'caja'},
};
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul'];
const PDVS_MAPA = [
  {n:'Carrefour Palermo', canal:'Supermercado', dist:'Distribuidora Norte SA'},
  {n:'Café Botánico Norte', canal:'Gastronomía', dist:'Bebidas Elite'},
  {n:'Mini Soho Market', canal:'Minimarket', dist:'Bebidas Elite'},
  {n:'Café Serrano', canal:'Gastronomía', dist:'Bebidas Elite'},
  {n:'Market Dorrego', canal:'Minimarket', dist:'Distribuidora Norte SA'},
  {n:'Almacén Nicaragua', canal:'Almacén', dist:'Distribuidora Norte SA'},
  {n:'Autoservicio Honduras', canal:'Almacén', dist:'Distribuidora Norte SA'},
  {n:'Almacén Güemes', canal:'Almacén', dist:'Bebidas Elite'},
];
const PRODUCTOS_MAPA = [
  {n:'Espumante Brut 750ml', cat:'Espumantes'},
  {n:'Aperitivo de Hierbas 700ml', cat:'Aperitivos'},
  {n:'Gin Botánico Premium 750ml', cat:'Destilados'},
  {n:'Cerveza Artesanal IPA 473ml', cat:'Cervezas'},
  {n:'Vino Malbec Reserva 750ml', cat:'Vinos'},
];
function monthlySeries(base, seedBase, trend, spread){
  return MESES.map((m,i)=> vary(base*(1+(i-6)*trend), seedBase+m, spread));
}

let filters = { periodo: PERIODOS[0], canal: CANALES[0], region: REGIONES[0], provincia: PROVINCIAS[0], cliente: CLIENTES[0], categoria: CATEGORIAS[0], segmento: SEGMENTOS[0], producto: PRODUCTOS[0], um: UNIDADES[0], vendedor: VENDEDORES[0], distribuidor: DISTRIBUIDORES[0] };
let current = 'ventas';
let sellthroughTab = 'sellout';
let rankingDim = 'cliente';
let windowDim = 'producto';
let agingDim = 'cliente';
let pnlCols = { monto: true, pct: true, var: true };
function togglePnlCol(col){
  pnlCols[col] = !pnlCols[col];
  if(!pnlCols.monto && !pnlCols.pct && !pnlCols.var) pnlCols[col] = true;
  renderContent();
}
let chatMessages = [];
let finChatMessages = [];
const FIN_CHAT_SUGGESTIONS = [
  '¿Qué está explicando la caída de EBITDA?',
  '¿Cuál es el cliente con mayor deuda vencida?',
  '¿Cómo viene el ciclo de conversión de efectivo?',
];
let mapZones = [];
let drawingZone = false;
let currentZonePoints = [];
let mapaAnalysisTab = 'pdvs';
let mapaFuente = 'sellout';
let pdvSelected = new Set();
let pdvGrupos = [];
let pdvGrupoNombreDraft = '';
let matrizFiltroCompra = [];
let matrizFiltroNoCompra = [];
let matrizIdentificado = false;
let oportunidadIdentificado = false;
let segmentacionCategoria = 'mix';
let oportSkuTestigos = [PRODUCTOS_MAPA[2].n];
let oportSkuObjetivos = [PRODUCTOS_MAPA[0].n];
let promoForm = {
  nombre: 'Activación SKU objetivo en zona seleccionada',
  mecanica: 'Precio especial',
  duracion: 4,
  precioActual: 50,
  precioPromo: 45,

/* ---------- deterministic pseudo-random helpers (so filters feel "alive") ---------- */
function hash(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h<<5)-h+str.charCodeAt(i); h|=0; } return h; }
function rand01(seed){ const x = Math.sin(seed*99.71)*10000; return x - Math.floor(x); }
function vary(base, seedStr, spreadPct){ const r = rand01(hash(seedStr)); return base * (1 + (r-0.5)*2*spreadPct); }
function money(n){ return '$' + Math.round(n).toLocaleString('es-AR'); }
function moneyK(n){ if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(0)+'K'; return '$'+Math.round(n); }
function num(n,d=0){ return n.toLocaleString('es-AR',{maximumFractionDigits:d,minimumFractionDigits:d}); }
function pctStr(n,d=1){ return (n>=0?'+':'') + n.toFixed(d) + '%'; }
function deltaClass(n){ return n>0.15?'up':(n<-0.15?'down':'flat'); }
function fseed(){ return filters.periodo+filters.canal+filters.region; }

    deudaVencida: vary(52000000, s+'dv', .3),
    dVol: vary(3.4, s+'dvol', .4),
    dVenta: vary(5.1, s+'dvn', .4),
    dMix: vary(-1.2, s+'dmix', .6),
    dPrecio: vary(6.8, s+'dpp', .3),
    dClientes: vary(2.0, s+'dcli', .5),
    dDiasPago: vary(-4.5, s+'ddp', .4),
    dDeuda: vary(12.3, s+'ddv', .5),
  };
}
function ventasSeries(){
  const s = ventasFseed();
  const k = ventasKpis();
  const um = UM_META[filters.um];
  const volSeries = monthlySeries(k.volumen, s+'vols', .03, .07);
  const vnSeries = monthlySeries(k.ventaNeta, s+'vns', .03, .07);
  const mixBrands = [
    {n:'Marca/Producto A', peso:46},
    {n:'Marca/Producto B', peso:33},
    {n:'Marca/Producto C', peso:21},
  ];
  mixBrands.forEach(b=>{
    b.alcance = vary(97, s+'mixb'+b.n, .12);
    b.volObj = Math.round(vary(180000, s+'vo'+b.n, .2) * b.peso/100 * um.volFactor);
    b.volReal = Math.round(b.volObj * b.alcance/100);
  });
  const mixAlcance = mixBrands.reduce((a,b)=>a+b.peso*b.alcance,0)/100;
  const mixAlcanceAcum = vary(mixAlcance, s+'mixalcacum', .05);
  const precioCumplMes = vary(101, s+'ppcumplmes', .06);
  const precioCumplAcum = vary(100, s+'ppcumplacum', .04);
  const mixSeries = MESES.map((m,i)=> vary(mixAlcance*(0.97+i*0.005), s+'mixm'+m, .05));
  const precioSeries = monthlySeries(k.precioProm, s+'pps', .012, .04);
  const precioMoM = (precioSeries[6]/precioSeries[5]-1)*100;
  const precioYoY = vary(6.8, s+'ppyoy', .3);
  const clientesSeries = MESES.map((m,i)=> Math.round(vary(k.clientes*(1+(i-6)*0.015), s+'clim'+m, .1)));
  const clientesMoM = (clientesSeries[6]/clientesSeries[5]-1)*100;
  const clientesYoY = vary(2.0, s+'cliyoy', .5);
  const volCumplimientoMes = vary(97, s+'volcumpmes', .08);
  const volCumplimientoAcum = vary(99, s+'volcumpacum', .05);
  const ventaCumplimientoMes = vary(101, s+'vncumpmes', .08);
  const ventaCumplimientoAcum = vary(100, s+'vncumpacum', .05);
  const compBasis = filters.periodo==='Presupuesto' ? 'presupuesto de cada mes' : 'mismo mes, año anterior';
  const volDeltas      = MESES.map((m)=> vary(k.dVol,      s+'voldelta'+m, .6));
  const vnDeltas        = MESES.map((m)=> vary(k.dVenta,    s+'vndelta'+m, .6));
  const precioDeltas    = MESES.map((m)=> vary(precioYoY,   s+'ppdelta'+m, .5));
  const clientesDeltas  = MESES.map((m)=> vary(clientesYoY, s+'clidelta'+m, .5));
  return { k, um, volSeries, vnSeries, mixBrands, mixAlcance, mixAlcanceAcum, mixSeries, precioSeries, precioMoM, precioYoY, precioCumplMes, precioCumplAcum, clientesSeries, clientesMoM, clientesYoY, volCumplimientoMes, volCumplimientoAcum, ventaCumplimientoMes, ventaCumplimientoAcum, compBasis, volDeltas, vnDeltas, precioDeltas, clientesDeltas };
}
function rankingDimMeta(){
  const map = {
    canal:     {label:'Canal', items: CANALES.slice(1)},
    region:    {label:'Región', items: REGIONES.slice(1)},
    cliente:   {label:'Cliente', items: CLIENTES.slice(1)},
    categoria: {label:'Categoría', items: CATEGORIAS.slice(1)},
    producto:  {label:'Producto', items: PRODUCTOS.slice(1)},
    vendedor:  {label:'Vendedor', items: VENDEDORES.slice(1)},
  };
  return map[rankingDim];
}
function rankingRows(){
  const meta = rankingDimMeta();
  const s = ventasFseed();
  const um = UM_META[filters.um];
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const volKg = vary(180000, seed+'v', .35)/(i*0.6+1);
    const vn = vary(430000000, seed+'vn', .35)/(i*0.6+1);
    const nprod = Math.max(1, Math.round(vary(9, seed+'np', .4)));
    return { it, vol: volKg*um.volFactor, vn, nprod, precioNeto: (vn/volKg)*um.priceFactor };
  }).sort((a,b)=>b.vol-a.vol);
}
function agingDimMeta(){
  const map = {
    cliente: {label:'Cliente', items: CLIENTES.slice(1)},
    canal:   {label:'Canal', items: CANALES.slice(1)},
    region:  {label:'Región', items: REGIONES.slice(1)},
  };
  return map[agingDim];
}
function agingRows(baseTotal, seedTag){
  const meta = agingDimMeta();
  const s = ventasFseed();
  return meta.items.map((it,i)=>{
    const seed = s+seedTag+it;
    const total = vary(baseTotal, seed+'tot', .4)/(i*0.6+1);
    const b30 = total*vary(0.5, seed+'b30', .25);
    const b60 = total*vary(0.3, seed+'b60', .3);
    const b90 = Math.max(0, total-b30-b60);
    return { it, total, b30, b60, b90 };
  }).sort((a,b)=>b.total-a.total);
}

/* ---------- combinadores Sell-In (SI) + Sell-Out (SO) ---------- */
function rankingRowsSellOut(){
  const meta = rankingDimMeta();
  const s = ventasFseed()+'so';
  const um = UM_META[filters.um];
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const volKg = vary(150000, seed+'v', .35)/(i*0.6+1);
    const vn = vary(360000000, seed+'vn', .35)/(i*0.6+1);
    const nprod = Math.max(1, Math.round(vary(8, seed+'np', .4)));
    return { it, vol: volKg*um.volFactor, vn, nprod, precioNeto: (vn/volKg)*um.priceFactor };
  });
}
function rankingRowsCombined(){
  const si = rankingRows();
  const so = rankingRowsSellOut();
  const soMap = {}; so.forEach(r=>soMap[r.it]=r);
  return si.map(r=>({
    it:r.it, volSI:r.vol, volSO: soMap[r.it]?soMap[r.it].vol:0,
    vnSI:r.vn, vnSO: soMap[r.it]?soMap[r.it].vn:0,
    nprodSI:r.nprod, nprodSO: soMap[r.it]?soMap[r.it].nprod:0,
    precioSI:r.precioNeto, precioSO: soMap[r.it]?soMap[r.it].precioNeto:0,
  }));
}
function windowSummaryTableST(){
  const wtSI = windowSummaryTable();
  const items = wtSI.items;
  const um = UM_META[filters.um];
  const sSO = ventasFseed()+'so';
  const dataSO = WINDOWS.map(w=> items.map(it=>{
    const seed = sSO+w+it;
    const vol = vary(150000/items.length*2.2, seed+'vol', .3) * FLOW_FACTOR[w] * um.volFactor;
    const cli = Math.round(vary(420/items.length*2.2, seed+'cli', .3) * COUNT_FACTOR[w]);
    return { vol, cli };
  }));
  return { meta: wtSI.meta, items, dataSI: wtSI.data, dataSO };
}
function sellOutSeries(){
  const s = ventasFseed()+'so';
  const um = UM_META[filters.um];
  const volKg = vary(690000, s+'vol', .2);
  const ventaNeta = vary(1720000000, s+'vn', .2);
  const mix = vary(41, s+'mix', .1);
  const precioKg = vary(2495, s+'pp', .08);
  const clientes = Math.round(vary(2860, s+'cli', .15));

  const dVol = vary(2.1, s+'dvol', .4);
  const dVenta = vary(4.0, s+'dvn', .4);
  const dMix = vary(0.8, s+'dmix', .6);
  const dPrecio = vary(5.2, s+'dpp', .3);
  const dClientes = vary(3.3, s+'dcli', .5);

  const vnSeries = monthlySeries(ventaNeta, s+'vns', .03, .07);
  const mixSeries = MESES.map((m,i)=> vary(mix*(0.97+i*0.006), s+'mixm'+m, .06));
  const precioSeries = monthlySeries(precioKg, s+'pps', .012, .04);

  const ventaCumplimientoMes = vary(100, s+'vncumpmes', .08);
  const ventaCumplimientoAcum = vary(99, s+'vncumpacum', .05);
  const mixAlcance = vary(99, s+'mixalc', .08);
  const mixAlcanceAcum = vary(mixAlcance, s+'mixalcacum', .05);
  const precioCumplMes = vary(101, s+'ppcumplmes', .06);
  const precioCumplAcum = vary(100, s+'ppcumplacum', .04);

  const vnDeltas = MESES.map((m)=> vary(dVenta, s+'vndelta'+m, .6));
  const mixDeltas = MESES.map((m)=> vary(dMix, s+'mixdelta'+m, .8));
  const precioDeltas = MESES.map((m)=> vary(dPrecio, s+'ppdelta'+m, .5));

  const passthrough = MESES.map((m)=> vary(74, s+'pt'+m, .12));
  const soVnCumplMes = vary(98, s+'sovncmes', .08);
  const soVnCumplAcum = vary(100, s+'sovncacum', .05);

  return {
    volKg, volumenFmt: num(volKg*um.volFactor,um.dec)+' '+um.suf, ventaNeta, mix, precioKg,
    precioPromFmt: money(precioKg*um.priceFactor)+'/'+um.suf, clientes,
    dVol, dVenta, dMix, dPrecio, dClientes,
    vnSeries, mixSeries, precioSeries,
    ventaCumplimientoMes, ventaCumplimientoAcum, mixAlcance, mixAlcanceAcum, precioCumplMes, precioCumplAcum,
    vnDeltas, mixDeltas, precioDeltas, passthrough, soVnCumplMes, soVnCumplAcum, um,
  };
}

function zonesSvgHtml(){
  const completed = mapZones.map(z=>{
    const pts = z.points.map(p=>`${p.x},${p.y}`).join(' ');
    return `<polygon points="${pts}" fill="${z.color}33" stroke="${z.color}" stroke-width="0.4"/>`;
  }).join('');
  let inProgress = '';
  if(currentZonePoints.length){
    const pts = currentZonePoints.map(p=>`${p.x},${p.y}`).join(' ');
    const dots = currentZonePoints.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="0.8" fill="#fff"/>`).join('');
    inProgress = `<polyline points="${pts}" fill="none" stroke="#fff" stroke-width="0.3" stroke-dasharray="1,1"/>${dots}`;
  }
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">${completed}${inProgress}</svg>`;
}
function mapClick(e){
  if(!drawingZone) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const xPct = ((e.clientX - rect.left)/rect.width)*100;
  const yPct = ((e.clientY - rect.top)/rect.height)*100;
  currentZonePoints.push({x:xPct, y:yPct});
  renderContent();
}
function startDrawZone(){
  drawingZone = true;
  currentZonePoints = [];
  renderContent();
}
function finishZone(){
  if(currentZonePoints.length < 3){ alert('Marcá al menos 3 puntos para cerrar una zona.'); return; }
  const name = prompt('Nombre de la zona:', 'Zona '+(mapZones.length+1));
  if(name){
    const colors = ['#8b5cf6','#22c55e','#3b82f6','#ec4899','#eab308','#f97316'];
    mapZones.push({name, points: currentZonePoints, color: colors[mapZones.length % colors.length]});
  }
  drawingZone = false;
  currentZonePoints = [];
  renderContent();
}
function cancelZone(){
  drawingZone = false;
  currentZonePoints = [];
  renderContent();
}
function clearZones(){
  mapZones = [];
  renderContent();
}
function removeZone(i){
  mapZones.splice(i,1);
  renderContent();
}
function pdvsRankingData(){
  const s = fseed()+'pdvtable'+mapaFuente;
  const estados = ['Comprador','Potencial','No comprador'];
  const rows = PDVS_MAPA.map((p,i)=>{
    const seed = s+p.n;
    const estado = estados[Math.floor(rand01(hash(seed+'est'))*3)];
    const fact = estado==='No comprador' ? 0 : vary(50000,seed+'f',.6)/(i*0.4+1);
    const vol = estado==='No comprador' ? 0 : Math.round(vary(1000,seed+'v',.6)/(i*0.4+1));
    const skus = estado==='No comprador' ? 0 : Math.max(1,Math.round(vary(2.5,seed+'sk',.5)));
    const gap = vary(20000, seed+'g', .4)/(i*0.3+1);
    const fecha = estado==='No comprador' ? '-' : `2026-0${(i%6)+1}-${10+i}`;
    return { pdv:p.n, canal:p.canal, dist:p.dist, estado, fact, vol, skus, gap, fecha };
  });
  const compradores = rows.filter(r=>r.estado==='Comprador');
  const avgVol = compradores.length ? compradores.reduce((a,r)=>a+r.vol,0)/compradores.length : 0;
  rows.forEach(r=>{
    if(r.estado==='No comprador'){
      r.recomendado = true; r.tipo = 'no_compra'; r.motivo = 'No compra el producto — oportunidad de apertura'; r.score = r.gap*1.5;
    } else if(r.estado==='Potencial'){
      r.recomendado = true; r.tipo = 'potencial'; r.motivo = 'Cliente potencial identificado, sin activación'; r.score = r.gap*1.2;
    } else if(avgVol && r.vol < avgVol*0.6){
      r.recomendado = true; r.tipo = 'bajo_volumen'; r.motivo = `Compra, pero ${Math.round((1-r.vol/avgVol)*100)}% por debajo del volumen promedio del canal`; r.score = r.gap*1.1;
    } else {
      r.recomendado = false; r.tipo = 'ninguno'; r.motivo = 'Volumen en línea o por encima del promedio'; r.score = r.gap*0.3;
    }
  });
  return rows.sort((a,b)=>b.score-a.score);
}

function stOportunidadData(){
  const s = fseed()+'mapopor'+mapaFuente+oportSkuTestigos.join('+')+oportSkuObjetivos.join('+');
  const pdvsZona = Math.max(1, Math.round(vary(12, s+'z', .3)));
  const factorTestigos = Math.min(0.92, 0.5 + (oportSkuTestigos.length-1)*0.14);
  const compranTestigo = Math.max(0, Math.round(vary(pdvsZona*factorTestigos, s+'ct', .35)));
  const factorObjetivos = Math.min(0.85, 0.28 + (oportSkuObjetivos.length-1)*0.16);
  const noCompranObjetivo = Math.max(0, Math.round(vary(pdvsZona*factorObjetivos, s+'nco', .35)));
  const altoPotencial = Math.max(0, Math.round(vary(2+(oportSkuObjetivos.length-1), s+'ap', .5)));
  const gapConversion = Math.max(0, noCompranObjetivo - Math.round(vary(1,s+'gc',.6)));
  const oportunidadUsd = vary(72000, s+'op', .35);
  const volumenCajas = Math.round(vary(1601, s+'vc', .35));
  const pdvsRecomendados = Math.max(1, Math.round(vary(2, s+'pr', .4)));
  return {pdvsZona, compranTestigo, noCompranObjetivo, altoPotencial, gapConversion, oportunidadUsd, volumenCajas, pdvsRecomendados};
}
function oportunidadMatch(row){
  const compraSet = new Set(row.cols.filter(c=>c.compra).map(c=>c.producto));
  const okTestigo = oportSkuTestigos.some(p=>compraSet.has(p));
  const okObjetivo = !oportSkuObjetivos.every(p=>compraSet.has(p));
  return okTestigo && okObjetivo;
}
function oportunidadPdvsData(){
  const s = fseed()+'oportpdv'+mapaFuente+oportSkuTestigos.join('+')+oportSkuObjetivos.join('+');
  return matrizClienteProductoData().filter(oportunidadMatch).map(row=>{
    const compraSet = new Set(row.cols.filter(c=>c.compra).map(c=>c.producto));
    const faltantes = oportSkuObjetivos.filter(p=>!compraSet.has(p));
    const seed = s+row.pdv;

    return {pdv: row.pdv, canal: row.canal, dist: row.dist, faltantes, oport};
  }).sort((a,b)=>b.oport-a.oport);
}

function promoCalc(){
  const f = promoForm;
  const cajas = f.volumenPorPdv * f.pdvsObjetivo;
  const revenue = f.precioPromo * cajas;
  const descuentoPct = f.precioActual>0 ? (f.precioActual-f.precioPromo)/f.precioActual*100 : 0;
  const margenPct = Math.max(0, f.margenObjetivo - descuentoPct*0.3);
  const inversionMock = revenue*0.15;
  const contribUnit = f.precioPromo*(margenPct/100);
  const puntoEquilibrio = contribUnit>0 ? Math.round(inversionMock/contribUnit) : 0;
  const margenUsd = revenue*(margenPct/100);
  const roi = inversionMock>0 ? (margenUsd-inversionMock)/inversionMock*100 : 0;
  return {cajas, revenue, margenPct, puntoEquilibrio, roi, inversionMock, margenUsd};
}

function matrizClienteProductoData(){
  const s = fseed()+'matriz'+mapaFuente;
  return PDVS_MAPA.map(p=>{
    const cols = PRODUCTOS_MAPA.map(prod=>{
      const seed = s+p.n+prod.n;
      const compra = rand01(hash(seed+'c')) > 0.42;
      const vol = compra ? Math.round(vary(140, seed+'v', .5)) : 0;
      return { producto: prod.n, compra, vol };
    });
    return { pdv: p.n, canal: p.canal, dist: p.dist, cols };
  });
}
function matrizMatch(row){
  const compraSet = new Set(row.cols.filter(c=>c.compra).map(c=>c.producto));
  const okCompra = matrizFiltroCompra.every(p=>compraSet.has(p));
  const okNoCompra = matrizFiltroNoCompra.every(p=>!compraSet.has(p));
  return okCompra && okNoCompra;
}
function matrizMatchCount(data){
  if(matrizFiltroCompra.length===0 && matrizFiltroNoCompra.length===0) return 0;
  return data.filter(matrizMatch).length;
}
function toggleMatrizFiltro(tipo, producto){
  const arr = tipo==='compra' ? matrizFiltroCompra : matrizFiltroNoCompra;
  const otroArr = tipo==='compra' ? matrizFiltroNoCompra : matrizFiltroCompra;
  const idx = arr.indexOf(producto);
  if(idx>=0){
    arr.splice(idx,1);
  } else {
    arr.push(producto);
    const otroIdx = otroArr.indexOf(producto); // un producto no puede estar en "Compró" y "No compró" a la vez
    if(otroIdx>=0) otroArr.splice(otroIdx,1);
  }
  matrizIdentificado = false;
  renderContent();
}

function segmentacionData(){
  const s = fseed()+'segm'+mapaFuente;
  const matriz = matrizClienteProductoData();
  const totalProductos = PRODUCTOS_MAPA.length;
  return PDVS_MAPA.map(p=>{
    const mrow = matriz.find(r=>r.pdv===p.n);
    const nProductos = mrow.cols.filter(c=>c.compra).length;
    const seed = s+p.n;
    const base = monthlySeries(180, seed+'mensual', 0.015, .5).map(v=>Math.max(0,Math.round(v)));
    const actividad = MESES.map(m=> rand01(hash(seed+'act'+m)) > 0.24);
    const volMensual = base.map((v,idx)=> actividad[idx] ? v : 0);
    let mesesSinComprar = 0;
    for(let idx=volMensual.length-1; idx>=0; idx--){ if(volMensual[idx]===0) mesesSinComprar++; else break; }
    const ultimoMes = volMensual[volMensual.length-1];
    const mesAnterior = volMensual[volMensual.length-2] ?? 0;
    const historico = volMensual.slice(0,-1);
    const avgHistorico = historico.length ? historico.reduce((a,b)=>a+b,0)/historico.length : 0;
    const vsPromedioPct = avgHistorico>0 ? ((ultimoMes-avgHistorico)/avgHistorico*100) : (ultimoMes>0?0:-100);
    const vsPeriodoAnteriorPct = mesAnterior>0 ? ((ultimoMes-mesAnterior)/mesAnterior*100) : (ultimoMes>0?0:-100);
    const volAnioAnterior = Math.max(0, Math.round(vary(180, seed+'anioant', .5)));
    const vsAnioAnteriorPct = volAnioAnterior>0 ? ((ultimoMes-volAnioAnterior)/volAnioAnterior*100) : (ultimoMes>0?0:-100);
    const churn = mesesSinComprar>=2 || vsPromedioPct<=-30;
    return { pdv:p.n, canal:p.canal, dist:p.dist, nProductos, totalProductos, volMensual, mesesSinComprar, ultimoMes, mesAnterior, avgHistorico, vsPromedioPct, vsPeriodoAnteriorPct, volAnioAnterior, vsAnioAnteriorPct, churn };
  });
}

function finData(){
  const s = fseed()+'fin';
  const meses = MESES;
  const um = UM_META[filters.um];
  function ratioSeries(base, tag, spread){ return meses.map(m=>vary(base, s+tag+m, spread)); }

  const ventaNetaM = monthlySeries(vary(1980000000,s+'vnbase',.12), s+'vnm', .02, .07);
  const volumenM = monthlySeries(vary(920000,s+'volbase',.12), s+'volmn', .015, .07);
  const descRatioM = ratioSeries(0.032, 'desc', .25);
  const cmvRatioM = ratioSeries(0.58, 'cmv', .06);
  const gDistM = ratioSeries(0.05, 'gdist', .12);
  const gComM = ratioSeries(0.09, 'gcom', .1);
  const gMktM = ratioSeries(0.04, 'gmkt', .15);
  const gAdmM = ratioSeries(0.06, 'gadm', .08);
  const gPerM = ratioSeries(0.05, 'gper', .07);
  const daM = ratioSeries(0.02, 'da', .1);
  const finM = ratioSeries(0.015, 'finr', .3);
  const impRatioM = ratioSeries(0.32, 'imp', .1);

  const rows = meses.map((m,i)=>{
    const ventaNeta = ventaNetaM[i];
    const ventaBruta = ventaNeta/(1-descRatioM[i]);
    const descuentos = ventaBruta-ventaNeta;
    const cmv = ventaNeta*cmvRatioM[i];
    const margenBruto = ventaNeta-cmv;
    const gDist = ventaNeta*gDistM[i];
    const gCom = ventaNeta*gComM[i];
    const gMkt = ventaNeta*gMktM[i];
    const gAdm = ventaNeta*gAdmM[i];
    const gPer = ventaNeta*gPerM[i];
    const ebitda = margenBruto-gDist-gCom-gMkt-gAdm-gPer;
    const da = ventaNeta*daM[i];
    const ebit = ebitda-da;
    const finRes = ventaNeta*finM[i];
    const rai = ebit-finRes;
    const imp = Math.max(0,rai)*impRatioM[i];
    const resultadoNeto = rai-imp;
    return {ventaNeta, ventaBruta, descuentos, cmv, margenBruto, gDist, gCom, gMkt, gAdm, gPer, ebitda, da, ebit, fin:finRes, rai, imp, resultadoNeto};
  });

  const LINES = [
    {key:'ventaBruta', label:'Venta Bruta', sign:1},
    {key:'descuentos', label:'(-) Descuentos y Bonificaciones', sign:-1},
    {key:'ventaNeta', label:'Venta Neta', sign:1, bold:true, subtotal:true},
    {key:'cmv', label:'(-) Costo de Mercadería Vendida', sign:-1},
    {key:'margenBruto', label:'Margen Bruto', sign:1, bold:true, subtotal:true},
    {key:'gDist', label:'(-) Gastos de Distribución y Logística', sign:-1},
    {key:'gCom', label:'(-) Gastos Comerciales y Trade', sign:-1},
    {key:'gMkt', label:'(-) Gastos de Marketing y Publicidad', sign:-1},
    {key:'gAdm', label:'(-) Gastos Administrativos', sign:-1},
    {key:'gPer', label:'(-) Gastos de Personal (Estructura Comercial)', sign:-1},
    {key:'ebitda', label:'EBITDA', sign:1, bold:true, subtotal:true},
    {key:'da', label:'(-) Depreciaciones y Amortizaciones', sign:-1},
    {key:'ebit', label:'EBIT', sign:1, bold:true, subtotal:true},
    {key:'fin', label:'(-) Resultado Financiero Neto', sign:-1},
    {key:'rai', label:'Resultado Antes de Impuestos', sign:1, bold:true, subtotal:true},
    {key:'imp', label:'(-) Impuesto a las Ganancias', sign:-1},
    {key:'resultadoNeto', label:'Resultado Neto', sign:1, bold:true, subtotal:true},
  ];

  const deltasByLine = {};
  LINES.forEach(l=>{
    deltasByLine[l.key] = meses.map(m => (rand01(hash(s+'delta'+l.key+m))-0.5) * 16);
  });

  const ventaNetaTotal = rows.reduce((a,r)=>a+r.ventaNeta,0);
  const pnlTable = LINES.map(l=>{
    const monthly = rows.map((r,i)=>{
      const monto = r[l.key]*l.sign;
      const pct = r.ventaNeta ? monto/r.ventaNeta*100 : 0;
      const delta = deltasByLine[l.key][i];
      return {monto, pct, delta};
    });
    const montoTotal = monthly.reduce((a,m)=>a+m.monto,0);
    const pctTotal = ventaNetaTotal ? montoTotal/ventaNetaTotal*100 : 0;
    const deltaTotal = monthly.reduce((a,m)=>a+m.delta,0)/monthly.length;
    return {...l, monthly, total:{monto:montoTotal, pct:pctTotal, delta:deltaTotal}};
  });

  const volumenTotal = volumenM.reduce((a,v)=>a+v,0);
  const capTrabajo = vary(310000000,s+'ct',.15);
  const diasInv = vary(46,s+'di',.1);
  const dso = vary(34,s+'dso',.15);
  const dpo = vary(52,s+'dpo',.1);
  const cce = diasInv+dso-dpo;
  const dVol = (rand01(hash(s+'dvol'))-0.5)*10;
  const dVenta = (rand01(hash(s+'dvta'))-0.5)*10;
  const dCap = (rand01(hash(s+'dcap'))-0.5)*12;
  const dDiasInv = (rand01(hash(s+'ddi'))-0.5)*10;
  const dDso = (rand01(hash(s+'ddso'))-0.5)*10;
  const dDpo = (rand01(hash(s+'ddpo'))-0.5)*10;
  const dCce = (rand01(hash(s+'dcce'))-0.5)*10;

  const invSecosM = monthlySeries(vary(31,s+'is',.1), s+'ism', .01, .08);
  const invNoSecosM = monthlySeries(vary(58,s+'ins',.15), s+'insm', .01, .1);
  const invProdTermM = monthlySeries(vary(24,s+'ipt',.12), s+'iptm', .01, .09);
  const invTotalM = meses.map((m,i)=> invSecosM[i]*0.35 + invNoSecosM[i]*0.30 + invProdTermM[i]*0.35);
  const invProm = {
    secos: invSecosM.reduce((a,v)=>a+v,0)/invSecosM.length,
    noSecos: invNoSecosM.reduce((a,v)=>a+v,0)/invNoSecosM.length,
    prodTerm: invProdTermM.reduce((a,v)=>a+v,0)/invProdTermM.length,
    total: invTotalM.reduce((a,v)=>a+v,0)/invTotalM.length,
  };

  const dv = vary(52000000,s+'dv2',.3);

  return { s, meses, rows, LINES, pnlTable, ventaNetaTotal,
    kpis: { volumen: volumenTotal, ventaNeta: ventaNetaTotal, capTrabajo, diasInv, dso, dpo, cce, dVol, dVenta, dCap, dDiasInv, dDso, dDpo, dCce, um },
    inv: { invSecosM, invNoSecosM, invProdTermM, invTotalM, invProm },
    dv,
  };
}

    const seed = s+it;
    const diasBase = vary(34, seed+'d', .3);
    const diasM = MESES.map(m=>vary(diasBase, seed+'dm'+m, .18));
    const dias = diasM.reduce((a,v)=>a+v,0)/diasM.length;
    const venta = vary(90000000, seed+'v', .4)/(i*0.5+1);
    const delta = (rand01(hash(seed+'delta'))-0.5)*16;
    return {it, diasM, dias, venta, delta};
  }).sort((a,b)=>b.dias-a.dias);
}
function finDeudaVencidaRanking(){
  const meta = agingDimMeta();
  const s = ventasFseed()+'findvrk';
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const diasVencidosBase = vary(28, seed+'dv', .5);
    const diasVencidosM = MESES.map(m=>vary(diasVencidosBase, seed+'dvm'+m, .25));
    const diasVencidos = diasVencidosM.reduce((a,v)=>a+v,0)/diasVencidosM.length;
    const importe = vary(9000000, seed+'imp', .5)/(i*0.4+1);
    return {it, diasVencidosM, diasVencidos, importe};
  }).sort((a,b)=>b.importe-a.importe);
}

const RGM_DESC_TIPOS_BASE = [3.5, 2.0, 1.5, 4.0, 2.5];
function rgmDescuentosPorDim(){
  const meta = agingDimMeta();
  const s = ventasFseed()+'rgmdesc';
  const motivos = ['Rotación de stock','Cierre de mes','Respuesta a competencia','Apertura de PDV','Bonificación por volumen','Recupero de cliente inactivo'];
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const rates = RGM_DESC_TIPOS_BASE.map((base,ti)=> Math.max(0, vary(base, seed+'r'+ti, .5)));
    const total = rates.reduce((a,v)=>a+v,0);
    const motivo = motivos[Math.floor(rand01(hash(seed+'mot'))*motivos.length)];
    return {it, rates, total, motivo};
  }).sort((a,b)=>b.total-a.total);
}
function rgmRankingSellIn(){
  const meta = agingDimMeta();
  const s = ventasFseed()+'rgmsi';
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const vn = vary(140000000, seed+'vn', .45)/(i*0.4+1);
    return {it, vn};
  }).sort((a,b)=>b.vn-a.vn);
}
function rgmRankingSellOut(){
  const meta = rgmSellOutDimMeta();
  const s = ventasFseed()+'rgmso';
  return meta.items.map((it,i)=>{
    const seed = s+it;
    const vn = vary(118000000, seed+'vn', .45)/(i*0.4+1);
    return {it, vn};
  }).sort((a,b)=>b.vn-a.vn);
}
function rgmRankingCombinada(){
  const si = rgmRankingSellIn();
  const so = rgmRankingSellOut();
  const totalSi = si.reduce((a,r)=>a+r.vn,0);
  const totalSo = so.reduce((a,r)=>a+r.vn,0);
  const sameUniverse = agingDim !== 'cliente';
  if(sameUniverse){
    const siMap = Object.fromEntries(si.map(r=>[r.it,r.vn]));
    const soMap = Object.fromEntries(so.map(r=>[r.it,r.vn]));
    const items = agingDimMeta().items;
    const rows = items.map(it=>({
      it,
      siVn: siMap[it]||0, siShare: totalSi ? (siMap[it]||0)/totalSi*100 : 0,
      soVn: soMap[it]||0, soShare: totalSo ? (soMap[it]||0)/totalSo*100 : 0,
      ratio: siMap[it] ? (soMap[it]||0)/siMap[it] : null,
    })).sort((a,b)=>b.siVn-a.siVn);
    return { sameUniverse, rows };
  }
  const n = Math.max(si.length, so.length);
  const rows = [];
  for(let i=0;i<n;i++){
    rows.push({
      rank: i+1,
      siItem: si[i]?si[i].it:null, siVn: si[i]?si[i].vn:0, siShare: si[i]&&totalSi?si[i].vn/totalSi*100:0,
      soItem: so[i]?so[i].it:null, soVn: so[i]?so[i].vn:0, soShare: so[i]&&totalSo?so[i].vn/totalSo*100:0,
    });
  }
  return { sameUniverse, rows };
}

function rgmCalcPrecio(){
  const f = rgmPriceForm;
  const costoEstimado = f.precioActual * (1 - f.margenBrutoAsumido/100);
  const costoRepuesto = costoEstimado * (1 + f.costoReposicion/100);
  const precioPorCosto = costoRepuesto / (1 - f.margenObjetivo/100);
  const passthrough = 0.8;
  const precioPorInflacion = f.precioActual * (1 + (f.inflacion/100)*passthrough);
  const precioBaseSugerido = (precioPorCosto + precioPorInflacion)/2;
  const bandaMin = f.precioCompetencia*0.92;
  const bandaMax = f.precioCompetencia*1.08;
  const precioSugerido = Math.min(bandaMax, Math.max(bandaMin, precioBaseSugerido));
  const ajustadoPorBanda = Math.abs(precioBaseSugerido-precioSugerido) > 0.5;
  const deltaVsActual = (precioSugerido-f.precioActual)/f.precioActual*100;
  const priceIndexVsComp = precioSugerido/f.precioCompetencia*100;
  const margenResultante = (precioSugerido-costoRepuesto)/precioSugerido*100;
  rgmPriceResult = { costoEstimado, costoRepuesto, precioPorCosto, precioPorInflacion, precioBaseSugerido, bandaMin, bandaMax, precioSugerido, ajustadoPorBanda, deltaVsActual, priceIndexVsComp, margenResultante };
  renderContent();
}

function rgmCalcElasticidad(){
  const f = rgmElastForm;
  const cm0 = f.precioActual - f.costoUnitario;
  const cmPct0 = f.precioActual ? cm0/f.precioActual*100 : 0;
  const nuevoPrecio = f.precioActual*(1+f.variacionPrecio/100);
  const nuevoVolumen = Math.max(0, f.volumenBase*Math.pow(1+f.variacionPrecio/100, f.elasticidad));
  const ventaBase = f.volumenBase*f.precioActual;
  const ventaNueva = nuevoVolumen*nuevoPrecio;
  const deltaVenta = ventaBase ? (ventaNueva-ventaBase)/ventaBase*100 : 0;
  const deltaVolumen = f.volumenBase ? (nuevoVolumen-f.volumenBase)/f.volumenBase*100 : 0;
  const margenBase = f.volumenBase*cm0;
  const cmNueva = nuevoPrecio-f.costoUnitario;
  const margenNuevo = nuevoVolumen*cmNueva;
  const deltaMargen = margenBase ? (margenNuevo-margenBase)/margenBase*100 : 0;

  let precioOptimo = null, deltaVsOptimo = null;
  if(f.elasticidad < -1 && f.costoUnitario>0){
    precioOptimo = f.costoUnitario * (f.elasticidad/(f.elasticidad+1));
    deltaVsOptimo = (precioOptimo-f.precioActual)/f.precioActual*100;
  }

  const dP = f.variacionPrecio/100, cmDec = cmPct0/100;
  const breakEvenVolPct = (cmDec+dP)!==0 ? (-dP/(cmDec+dP))*100 : null;

  const puntos = [];
  let bestMargenIdx = -Infinity, bestMargenVar = 0;
  for(let v=-15; v<=15; v+=2.5){
    const p = f.precioActual*(1+v/100);
    const vol = Math.max(0, f.volumenBase*Math.pow(1+v/100, f.elasticidad));
    const venta = vol*p;
    const margen = vol*(p-f.costoUnitario);
    const ventaIdx = ventaBase? venta/ventaBase*100:0;
    const volIdx = f.volumenBase? vol/f.volumenBase*100:0;
    const margenIdx = margenBase? margen/margenBase*100:0;
    if(margenIdx>bestMargenIdx){ bestMargenIdx=margenIdx; bestMargenVar=v; }
    puntos.push({ variacion: v, ventaIdx, volIdx, margenIdx });
  }

  rgmElastResult = { cm0, cmPct0, nuevoPrecio, nuevoVolumen, ventaBase, ventaNueva, deltaVenta, deltaVolumen, margenBase, margenNuevo, deltaMargen, precioOptimo, deltaVsOptimo, breakEvenVolPct, puntos, bestMargenVar };
  renderContent();
}

      </div>
      <div class="simfield"><label>Canal</label>
        <select onchange="rgmSim.canal=this.value">${CANALES.map(o=>`<option ${o===rgmSim.canal?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield"><label>Región</label>
        <select onchange="rgmSim.region=this.value">${REGIONES.map(o=>`<option ${o===rgmSim.region?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield"><label>Cliente / Distribuidor</label>
        <select onchange="rgmSim.cliente=this.value">${CLIENTES_SIM.map(o=>`<option ${o===rgmSim.cliente?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield"><label>Cliente Sell-Out (tienda / PDV)</label>
        <select onchange="rgmSim.clienteSellOut=this.value">${CLIENTES_SELLOUT.map(o=>`<option ${o===rgmSim.clienteSellOut?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield" style="min-width:300px"><label>Grupo de PDVs (opcional — armado en Sell-Through)</label>
        ${pdvGrupos.length ? `
          <select onchange="rgmSim.grupoPdvId=this.value||null;renderContent()">
            <option value="">Sin grupo — usar Cliente Sell-Out</option>
            ${pdvGrupos.map(g=>`<option value="${g.id}" ${rgmSim.grupoPdvId===g.id?'selected':''}>${g.nombre} (${g.pdvs.length} PDVs)</option>`).join('')}
          </select>
        ` : `<button class="btn secondary" style="width:100%" onclick="goToMapaPdvs()">📍 Armar grupo en Mapa de Clientes</button>`}
      </div>
      ${grupoSel ? `
      <div class="simfield" style="flex:1 1 100%">
        <label>PDVs en "${grupoSel.nombre}"</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${grupoSel.pdvs.map(p=>`<span class="pill blue">${p}</span>`).join('')}
          <span class="pill gray" style="cursor:pointer" onclick="rgmSim.grupoPdvId=null;renderContent()">Quitar grupo ✕</span>
        </div>
      </div>` : ''}
      <div class="simfield"><label>Período</label>
        <select onchange="rgmSim.periodo=this.value">${PERIODOS.map(o=>`<option ${o===rgmSim.periodo?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield"><label>Budget del período</label>
        <input type="number" value="${rgmSim.budget}" onchange="rgmSim.budget=Number(this.value)">
      </div>
      <div class="simfield"><label>Precio objetivo (opcional)</label>
        <input type="number" placeholder="$/kg" value="${rgmSim.precioObj}" onchange="rgmSim.precioObj=this.value">
      </div>
      <div class="simfield" style="min-width:280px"><label>Tipo de dinámica</label>
        ${rgmToggle('tipo', null, RGM_DINAMICAS.map(t=>[t,t]))}
      </div>
      <div class="simfield"><label>Objetivo de la dinámica</label>
        <select onchange="rgmSim.objetivo=this.value">${RGM_OBJETIVOS.map(o=>`<option ${o===rgmSim.objetivo?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="simfield" style="min-width:260px"><label>Mecánica / características</label>
        <input type="text" value="${rgmSim.caracteristicas}" onchange="rgmSim.caracteristicas=this.value">
      </div>
      <div class="simfield" style="min-width:260px"><label>Hipótesis comercial</label>
        <input type="text" value="${rgmSim.hipotesis}" onchange="rgmSim.hipotesis=this.value">
      </div>
      <div class="simfield" style="flex-direction:row;gap:8px;align-items:flex-end">
        <button class="btn" onclick="runIA()">✨ Sugerir con IA</button>
        <button class="btn secondary" onclick="openRgmManualForm()">➕ Armar dinámica manualmente</button>
        ${rgmSimActivo() ? `<span class="pill gray" style="cursor:pointer" onclick="resetRgmSim()" title="Volver todos los filtros del simulador a cero">↺ Limpiar filtros</span>` : ''}
      </div>
    </div>

    ${iaResult ? iaResultHtml() : (rgmManualForm ? rgmManualFormHtml() : `<div class="empty-state"><div class="ico">◇</div>Configurá los filtros y elegí cómo seguir: presioná "Sugerir con IA" para que Nexus AI proponga precio, targeting y volumen, o "Armar dinámica manualmente" para cargarla vos mismo directo al seguimiento.</div>`)}

    <div id="rgmSeguimientoSection">
    ${sectionTitle('Seguimiento de promociones','Plan vs. real — activas, planificadas y finalizadas')}
    <div class="panel">
      <h3>Cómo leer esta sección</h3>
      <div class="panel-sub">Cada tarjeta mezcla plan vs real. El plan viene de la dinámica diseñada en el Simulador de dinámica promocional de arriba. El real se simula desde las fuentes demo de ventas PDV/SKU, cobertura por zona y ejecución trade. Las tarjetas marcadas "Guardada desde el simulador" son las que fuiste guardando con "Guardar esta dinámica en seguimiento" / "Guardar en seguimiento".</div>
    </div>
    ${seguimientoPromosData().map(promoCardHtml).join('')}
    </div>
  `;
}
function rgmTracking(){
  const estadoPill = {'En curso':'blue','Planificada':'gray','Finalizada':'green'};
  return rgmDinamicas.map((r,i)=>`<tr>
    <td>${r.n}</td>
    <td>${r.cl}</td>
    <td>
      <select onchange="rgmDinamicas[${i}].estado=this.value;renderContent()" style="background:var(--bg-2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:6px;font-size:11.5px">
        ${['En curso','Planificada','Finalizada'].map(e=>`<option ${e===r.estado?'selected':''}>${e}</option>`).join('')}
      </select>
    </td>
    <td>${r.vsObj?r.vsObj.toFixed(0)+'%':'—'}</td>
    <td>${r.roi?r.roi.toFixed(1)+'x':'—'}</td>
    <td><span class="pill red" style="cursor:pointer" onclick="removeRgmDinamica(${i})">Quitar</span></td>
  </tr>`).join('');
}
function rgmSeguimientoFechas(){
  const hoy = new Date('2026-07-16');
  const fin = new Date(hoy); fin.setDate(fin.getDate()+28);
  const fmt = d=>d.toISOString().slice(0,10);
  return {ini: fmt(hoy), fin: fmt(fin)};
}
function addRgmDinamica(source){
  const grupo = pdvGrupos.find(g=>g.id===rgmSim.grupoPdvId) || null;
  const clienteLabel = grupo ? `${grupo.nombre} (${grupo.pdvs.length} PDVs)`
    : (rgmSim.clienteSellOut!==CLIENTES_SELLOUT[0] ? rgmSim.clienteSellOut
    : (rgmSim.cliente!==CLIENTES_SIM[0] ? rgmSim.cliente : rgmSim.canal));
  const skuLabel = rgmSim.sku!==SKUS[0] ? ' — '+rgmSim.sku : '';
  const nombre = `${rgmSim.tipo}${skuLabel} — ${clienteLabel}`;
  const {ini, fin} = rgmSeguimientoFechas();
  if(source==='ia' && iaResult){
    const r = iaResult;
    const pdvsPlan = r.targeting.length;
    rgmDinamicas.push({
      n: nombre, ini, fin, estado:'En planificación',
      pdvsPlan, pdvsReal:0,
      volPlan: Math.round(r.volumenObjetivo), volReal:0,
      factPlan: Math.round(r.volumenObjetivo*r.precioSugerido), factReal:0,
      margenPlan: 30, margenDesvio:0,
      semanas:[0,0,0,0],
      proxima: `Validar mecánica con RGM, confirmar ${pdvsPlan} PDVs objetivo y cargar primera lectura semanal. ROI proyectado ${r.roi.toFixed(1)}x.`,
    });
  } else {
    rgmDinamicas.push({
      n: nombre, ini, fin, estado:'En planificación',
      pdvsPlan: grupo?grupo.pdvs.length:12, pdvsReal:0,
      volPlan: 1000, volReal:0, factPlan: 45000, factReal:0,
      margenPlan: 30, margenDesvio:0,
      semanas:[0,0,0,0],
      proxima: 'Confirmar PDVs objetivo y cargar primera lectura semanal.',
    });
  }
  renderContent();
  setTimeout(()=>{ document.getElementById('rgmSeguimientoSection')?.scrollIntoView({behavior:'smooth', block:'start'}); }, 50);
}
function removeRgmDinamica(i){
  rgmDinamicas.splice(i,1);
  renderContent();
}
function openRgmManualForm(){
  const grupo = pdvGrupos.find(g=>g.id===rgmSim.grupoPdvId) || null;
  const clienteLabel = grupo ? `${grupo.nombre} (${grupo.pdvs.length} PDVs)`
    : (rgmSim.clienteSellOut!==CLIENTES_SELLOUT[0] ? rgmSim.clienteSellOut
    : (rgmSim.cliente!==CLIENTES_SIM[0] ? rgmSim.cliente : rgmSim.canal));
  const skuLabel = rgmSim.sku!==SKUS[0] ? ' — '+rgmSim.sku : '';
  rgmManualForm = { nombre: `${rgmSim.tipo}${skuLabel}`, cliente: clienteLabel, estado: 'Planificada', volObjetivoPct: 0, roiEsperado: 1.5 };
  iaResult = null;
  renderContent();
  setTimeout(()=>{ document.getElementById('rgmManualFormPanel')?.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
}
function cancelRgmManualForm(){
  rgmManualForm = null;
  renderContent();
}
function saveRgmManualForm(){
  if(!rgmManualForm) return;
  const f = rgmManualForm;
  const {ini, fin} = rgmSeguimientoFechas();
  const estadoMap = {'Planificada':'En planificación','En curso':'En ejecución','Finalizada':'Finalizada'};
  const estado = estadoMap[f.estado] || 'En planificación';
  const avance = Math.max(0, (f.volObjetivoPct||0)/100);
  const grupo = pdvGrupos.find(g=>g.id===rgmSim.grupoPdvId) || null;
  const pdvsPlan = grupo ? grupo.pdvs.length : 12;
  const volPlan = 1000, factPlan = 45000;
  rgmDinamicas.push({
    n: f.nombre, ini, fin, estado,
    pdvsPlan, pdvsReal: estado==='En planificación' ? 0 : Math.round(pdvsPlan*Math.min(1,avance||0.3)),
    volPlan, volReal: estado==='En planificación' ? 0 : Math.round(volPlan*Math.min(1,avance||0.3)),
    factPlan, factReal: estado==='En planificación' ? 0 : Math.round(factPlan*Math.min(1,avance||0.3)),
    margenPlan: 30, margenDesvio: f.volObjetivoPct ? (f.volObjetivoPct-100) : 0,
    semanas: estado==='Finalizada' ? [100,100,100,100] : (estado==='En ejecución' ? [25,40,0,0] : [0,0,0,0]),
    proxima: `ROI esperado ${Number(f.roiEsperado).toFixed(1)}x — cargar avance semanal.`,
  });
  rgmManualForm = null;
  renderContent();
  setTimeout(()=>{ document.getElementById('rgmSeguimientoSection')?.scrollIntoView({behavior:'smooth', block:'start'}); }, 50);
}
function rgmManualFormHtml(){
  const f = rgmManualForm;
  return `
  <div class="panel" id="rgmManualFormPanel" style="border:1px solid rgba(139,92,246,.35)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="ico">✍️</div><h3 style="margin:0">Armar dinámica manualmente</h3></div>
    <div class="panel-sub">Cargá los datos vos mismo y guardala directo en el seguimiento — sin pasar por la sugerencia de IA</div>
    <div class="simbar" style="margin-top:12px">
      <div class="simfield" style="min-width:260px"><label>Nombre de la dinámica</label>
        <input type="text" value="${f.nombre}" onchange="rgmManualForm.nombre=this.value">
      </div>
      <div class="simfield" style="min-width:220px"><label>Cliente / Canal</label>
        <input type="text" value="${f.cliente}" onchange="rgmManualForm.cliente=this.value">
      </div>
      <div class="simfield"><label>Estado inicial</label>
        <select onchange="rgmManualForm.estado=this.value">
          ${['Planificada','En curso','Finalizada'].map(e=>`<option ${e===f.estado?'selected':''}>${e}</option>`).join('')}
        </select>
      </div>
      <div class="simfield"><label>Volumen vs. objetivo (%)</label>
        <input type="number" value="${f.volObjetivoPct}" onchange="rgmManualForm.volObjetivoPct=Number(this.value)">
      </div>
      <div class="simfield"><label>ROI esperado (x)</label>
        <input type="number" step="0.1" value="${f.roiEsperado}" onchange="rgmManualForm.roiEsperado=Number(this.value)">
      </div>
      <div class="simfield" style="flex-direction:row;gap:8px;align-items:flex-end">
        <button class="btn" onclick="saveRgmManualForm()">💾 Guardar en seguimiento</button>
        <button class="btn secondary" onclick="cancelRgmManualForm()">Cancelar</button>
      </div>
    </div>
  </div>`;
}
function runIA(){
  const grupo = pdvGrupos.find(g=>g.id===rgmSim.grupoPdvId) || null;
  const seed = hash(rgmSim.sku+rgmSim.canal+rgmSim.region+rgmSim.cliente+rgmSim.clienteSellOut+(rgmSim.grupoPdvId||'')+rgmSim.periodo+rgmSim.tipo+rgmSim.objetivo);
  const basePrice = 2350 + (rand01(seed)*400);
  const discountPct = 8 + rand01(seed*1.7)*7;
  const precioSugerido = basePrice*(1-discountPct/100);
  const volumenBase = 42000 + rand01(seed*2.3)*18000;
  const elasticidad = 1.6 + rand01(seed*3.1)*0.6;
  const volIncPct = discountPct*elasticidad*0.55;
  const volumenObjetivo = volumenBase*(1+volIncPct/100);
  const roi = 1.4 + rand01(seed*4.7)*1.1;
  const universo = grupo ? grupo.pdvs : ['Cadena Metro','Hiper Andes','Distribuidora Norte','Mayorista Sur','Super Regional','Distribuidora Litoral','Autoservicios GBA Norte','Cadena Regional Sur'];
  const targeting = universo.map(c=>({c, gap: rand01(hash(seed+c))*100}))
    .sort((a,b)=>b.gap-a.gap).slice(0,5)
    .map(t=>({...t, inv: rgmSim.budget * (t.gap/100) / 3}));
  iaResult = { basePrice, discountPct, precioSugerido, volumenBase, volumenObjetivo, volIncPct, roi, targeting, grupoNombre: grupo?grupo.nombre:null };
  renderContent();
}
function clearRgmSimulator(){
  iaResult = null;
  rgmManualForm = null;
  renderContent();
}
function iaResultHtml(){
  const r = iaResult;
  const targetLabel = r.grupoNombre ? `el grupo <b>"${r.grupoNombre}"</b>` : `<b>${rgmSim.clienteSellOut}</b>`;
  return `
  <div class="ia-card">
    <div class="ia-head"><div class="ico">✨</div><b>Recomendación de Nexus AI</b><span class="pill pink" style="margin-left:auto">${rgmSim.tipo}</span><span class="pill gray" style="cursor:pointer;margin-left:8px" onclick="clearRgmSimulator()" title="Descartar esta recomendación y armar otra desde cero — lo que ya guardaste en Seguimiento no se toca">✕ Limpiar</span></div>
    <div class="nexus-block" style="background:var(--accent-soft);border:1px solid rgba(139,92,246,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px">
      <p style="margin:0"><strong>Objetivo:</strong> ${rgmSim.objetivo} · <strong>Mecánica:</strong> ${rgmSim.caracteristicas}</p>
      <p style="margin:6px 0 0 0"><strong>Hipótesis comercial:</strong> ${rgmSim.hipotesis}</p>
    </div>
    <div class="rationale">
      La IA identificó que en <b>${rgmSim.canal.toLowerCase()}</b> / <b>${rgmSim.region.toLowerCase()}</b>, sobre ${targetLabel}, el ${(30+r.discountPct).toFixed(0)}% de los PDV con distribución activa no alcanza el volumen mínimo de activación. Redireccionar la inversión de "${rgmSim.tipo}" hacia ${r.grupoNombre?'los PDVs listados abajo':'los clientes listados abajo'}, en lugar de aplicarla de forma pareja, proyecta un ROI de <b>${r.roi.toFixed(1)}x</b> (vs. ~0.9x de la dinámica actual). No es solo el diagnóstico: esta es la iniciativa priorizada para ejecutar.
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      ${kpiCard('Precio objetivo sugerido', money(r.precioSugerido)+'/kg', -r.discountPct, pctStr(-r.discountPct)+' vs. precio base')}
      ${kpiCard('Volumen objetivo', num(r.volumenObjetivo,0)+' kg', r.volIncPct, pctStr(r.volIncPct)+' para sostener masa de contribución')}
      ${kpiCard('Budget asignado', money(rgmSim.budget), 0, 'del período seleccionado')}
      ${kpiCard('ROI proyectado', r.roi.toFixed(1)+'x', (r.roi-1)*100, 'vs. escenario flat')}
    </div>
    <div class="section-title" style="margin-top:20px">Targeting sugerido — ${r.grupoNombre?`dentro del grupo "${r.grupoNombre}"`:'dónde direccionar la inversión'}</div>
    <table><thead><tr><th>${r.grupoNombre?'PDV':'Cliente / PDV'}</th><th>Gap score</th><th>Inversión sugerida</th></tr></thead>
    <tbody>${r.targeting.map(t=>`<tr><td>${t.c}</td><td>${t.gap.toFixed(0)}/100</td><td>${money(t.inv)}</td></tr>`).join('')}</tbody></table>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="addRgmDinamica('ia')">💾 Guardar esta dinámica en seguimiento</button>
      <button class="btn secondary" onclick="clearRgmSimulator()">✕ Limpiar y armar otra</button>
    </div>
  </div>`;
}
function chartsRGM(){
  const sctx = fseed()+'ctx';
  const tasa = monthlySeries(38, sctx+'tasa', .01, .08);
  const inflGenS = monthlySeries(3.8, sctx+'infg', .01, .15);
  const inflAliS = monthlySeries(4.6, sctx+'infa', .01, .15);
  const inflIpimS = monthlySeries(4.2, sctx+'ipim', .01, .18);
  lineChart('ch-rgm-ctx-tasa', MESES, [{label:'Tasa de interés', data:tasa, borderColor:'#8b5cf6', backgroundColor:'rgba(139,92,246,.1)', tension:.3, pointRadius:2}], {labelFormatter: v=>v.toFixed(1)+'%'});
  lineChart('ch-rgm-ctx-inflgen', MESES, [{label:'Inflación general', data:inflGenS, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.1)', tension:.3, pointRadius:2}], {labelFormatter: v=>v.toFixed(1)+'%'});
  lineChart('ch-rgm-ctx-inflali', MESES, [{label:'Inflación alimentos', data:inflAliS, borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.1)', tension:.3, pointRadius:2}], {labelFormatter: v=>v.toFixed(1)+'%'});
  lineChart('ch-rgm-ctx-ipim', MESES, [{label:'Inflación IPIM', data:inflIpimS, borderColor:'#f97316', backgroundColor:'rgba(249,115,22,.1)', tension:.3, pointRadius:2}], {labelFormatter: v=>v.toFixed(1)+'%'});

  if(rgmElastResult){
    const r = rgmElastResult;
    lineChart('ch-rgm-elast', r.puntos.map(p=>(p.variacion>0?'+':'')+p.variacion+'%'), [
      {label:'Volumen (índice)', data:r.puntos.map(p=>p.volIdx), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.08)', tension:.3, pointRadius:2},
      {label:'Venta Neta (índice)', data:r.puntos.map(p=>p.ventaIdx), borderColor:'#8b5cf6', backgroundColor:'rgba(139,92,246,.08)', tension:.3, pointRadius:2},
      {label:'Margen de Contribución (índice)', data:r.puntos.map(p=>p.margenIdx), borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.08)', tension:.3, pointRadius:2},
    ], {labelFormatter: v=>v.toFixed(0)});
  }
}

/* ============================= INIT ============================= */
renderNav();
setView('ventas');
</script>
